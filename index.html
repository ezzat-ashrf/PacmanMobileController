```html
<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pacman Controller</title>

  <style>
    body {
      margin: 0;
      background: #05000a;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      overflow: hidden;
      user-select: none;
      touch-action: none;
    }

    h1 {
      color: #ffd400;
      text-shadow: 0 0 15px #ff00cc;
      margin-top: 30px;
      font-size: 32px;
    }

    .status {
      color: #00ff88;
      font-size: 22px;
      margin-top: 15px;
      min-height: 30px;
    }

    #startPanel {
      margin-top: 120px;
    }

    #startButton {
      width: 260px;
      height: 90px;
      border-radius: 30px;
      border: 4px solid #ffd400;
      background: #111;
      color: #ffd400;
      font-size: 38px;
      font-weight: bold;
      box-shadow: 0 0 25px #ffd400, inset 0 0 20px #ff00cc;
    }

    #joystickPanel {
      display: none;
      margin-top: 60px;
    }

    #joystickBase {
      width: 260px;
      height: 260px;
      border-radius: 50%;
      border: 5px solid #ff00cc;
      margin: 60px auto 0 auto;
      position: relative;
      box-shadow: 0 0 40px #7b2cff, inset 0 0 40px #ff00cc;
    }

    #joystick {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: #ffd400;
      position: absolute;
      left: 80px;
      top: 80px;
      box-shadow: 0 0 30px #ffd400;
    }

    #resultPanel {
      display: none;
      margin-top: 130px;
      font-size: 42px;
      font-weight: bold;
      text-shadow: 0 0 25px #ff00cc;
    }

    .win { color: #00ff88; }
    .lose { color: #ff3355; }
  </style>
</head>

<body>

<h1>PAC-MAN CONTROLLER</h1>

<div class="status" id="status">CONNECTING...</div>

<div id="startPanel">
  <button id="startButton">START</button>
</div>

<div id="joystickPanel">
  <div id="joystickBase">
    <div id="joystick"></div>
  </div>
</div>

<div id="resultPanel"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAXMzvgX8CovVUx9MZTSJzUd0l341H30Yk",
  authDomain: "packmanrealtime.firebaseapp.com",
  databaseURL: "https://packmanrealtime-default-rtdb.firebaseio.com/",
  projectId: "packmanrealtime",
  storageBucket: "packmanrealtime.firebasestorage.app",
  messagingSenderId: "247963806574",
  appId: "1:247963806574:web:df55fe89bdc3cee5346f7f",
  measurementId: "G-LH9K6EV8NC"
};

const app = initializeApp(firebaseConfig);
const database = getDatabase(app);

const directionRef = ref(database, "controllers/player1/direction");
const commandRef = ref(database, "controllers/player1/gameCommand");
const gameStateRef = ref(database, "controllers/player1/gameState");
const activePlayerRef = ref(database, "controllers/player1/activePlayerId");

const statusText = document.getElementById("status");
const startPanel = document.getElementById("startPanel");
const joystickPanel = document.getElementById("joystickPanel");
const resultPanel = document.getElementById("resultPanel");
const startButton = document.getElementById("startButton");
const joystick = document.getElementById("joystick");
const base = document.getElementById("joystickBase");

let myPlayerId = localStorage.getItem("pacmanPlayerId");

if (!myPlayerId)
{
  myPlayerId = "phone_" + Date.now() + "_" + Math.floor(Math.random() * 9999);
  localStorage.setItem("pacmanPlayerId", myPlayerId);
}

let activePlayerId = "";
let currentGameState = "";
let dragging = false;
let lastDirection = "";

const centerX = 130;
const centerY = 130;

statusText.innerText = "CONNECTED";

onValue(activePlayerRef, (snapshot) =>
{
  activePlayerId = snapshot.val() || "";
  refreshUI();
});

onValue(gameStateRef, (snapshot) =>
{
  currentGameState = snapshot.val() || "menu";
  refreshUI();
});

startButton.addEventListener("click", async () =>
{
  const stateSnap = await get(gameStateRef);
  const state = stateSnap.val() || "menu";

  const playerSnap = await get(activePlayerRef);
  const currentActivePlayer = playerSnap.val() || "";

  if (state === "playing" && currentActivePlayer !== myPlayerId)
  {
    showBusy();
    return;
  }

  await set(activePlayerRef, myPlayerId);

  await set(commandRef,
  {
    command: "start",
    playerId: myPlayerId,
    time: Date.now()
  });

  await set(directionRef, "right");

  statusText.innerText = "START SENT";
});

function refreshUI()
{
  if (currentGameState === "playing")
  {
    if (activePlayerId === myPlayerId)
      showJoystick();
    else
      showBusy();
  }
  else if (currentGameState === "win")
  {
    showResult("YOU WIN!", true);
  }
  else if (currentGameState === "lose")
  {
    showResult("GAME OVER", false);
  }
  else
  {
    showMenu();
  }
}

function showMenu()
{
  startPanel.style.display = "block";
  joystickPanel.style.display = "none";
  resultPanel.style.display = "none";

  statusText.innerText = "PRESS START";

  resetJoystickVisual();
}

function showJoystick()
{
  startPanel.style.display = "none";
  joystickPanel.style.display = "block";
  resultPanel.style.display = "none";

  statusText.innerText = "PLAYING";
}

function showBusy()
{
  startPanel.style.display = "none";
  joystickPanel.style.display = "none";
  resultPanel.style.display = "block";

  resultPanel.innerText = "CONTROLLER BUSY";
  resultPanel.className = "lose";

  statusText.innerText = "ANOTHER PLAYER IS PLAYING";

  resetJoystickVisual();
}

function showResult(text, isWin)
{
  startPanel.style.display = "none";
  joystickPanel.style.display = "none";
  resultPanel.style.display = "block";

  resultPanel.innerText = text;
  resultPanel.className = isWin ? "win" : "lose";

  statusText.innerText = "WAITING...";

  resetJoystickVisual();
}

function sendDirection(dir)
{
  if (currentGameState !== "playing") return;
  if (activePlayerId !== myPlayerId) return;
  if (dir === lastDirection) return;

  lastDirection = dir;

  set(directionRef, dir).then(() =>
  {
    statusText.innerText = "MOVE: " + dir.toUpperCase();
  });
}

function resetJoystickVisual()
{
  joystick.style.left = "80px";
  joystick.style.top = "80px";

  dragging = false;
}

base.addEventListener("touchstart", (e) =>
{
  e.preventDefault();
  dragging = true;
});

base.addEventListener("touchmove", (e) =>
{
  e.preventDefault();

  if (!dragging) return;

  const rect = base.getBoundingClientRect();

  let x = e.touches[0].clientX - rect.left;
  let y = e.touches[0].clientY - rect.top;

  let dx = x - centerX;
  let dy = y - centerY;

  const distance = Math.sqrt(dx * dx + dy * dy);
  const maxDistance = 80;

  if (distance > maxDistance)
  {
    dx = dx / distance * maxDistance;
    dy = dy / distance * maxDistance;
  }

  joystick.style.left = (centerX + dx - 50) + "px";
  joystick.style.top = (centerY + dy - 50) + "px";

  if (Math.abs(dx) > Math.abs(dy))
  {
    if (dx > 20)
      sendDirection("right");
    else if (dx < -20)
      sendDirection("left");
  }
  else
  {
    if (dy > 20)
      sendDirection("down");
    else if (dy < -20)
      sendDirection("up");
  }
});

base.addEventListener("touchend", (e) =>
{
  e.preventDefault();
  resetJoystickVisual();
});

base.addEventListener("touchcancel", (e) =>
{
  e.preventDefault();
  resetJoystickVisual();
});

</script>

</body>
</html>
