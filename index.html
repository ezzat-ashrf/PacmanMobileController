<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pacman Joystick</title>

<style>

body{
    margin:0;
    background:#05000a;
    overflow:hidden;
    font-family:Arial;
    color:white;
    text-align:center;
}

h1{
    color:#ffd400;
    margin-top:30px;
    text-shadow:0 0 15px #ff00cc;
}

#joystickBase{
    width:260px;
    height:260px;
    border-radius:50%;
    border:5px solid #ff00cc;
    margin:80px auto;
    position:relative;

    box-shadow:
    0 0 40px #7b2cff,
    inset 0 0 40px #ff00cc;
}

#joystick{
    width:100px;
    height:100px;
    border-radius:50%;
    background:#ffd400;
    position:absolute;
    left:80px;
    top:80px;

    box-shadow:
    0 0 25px #ffd400;
}

.status{
    color:#00ff88;
    font-size:24px;
}

</style>
</head>

<body>

<h1>PACMAN JOYSTICK</h1>

<div class="status" id="status">CONNECTED</div>

<div id="joystickBase">
    <div id="joystick"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    databaseURL: "https://packmanrealtime-default-rtdb.firebaseio.com/",
    projectId: "YOUR_PROJECT",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "XXXX",
    appId: "XXXX"
};

const app = initializeApp(firebaseConfig);
const database = getDatabase(app);

const directionRef = ref(database,"controllers/player1/direction");

const joystick = document.getElementById("joystick");
const base = document.getElementById("joystickBase");

let dragging = false;

const centerX = 130;
const centerY = 130;

function sendDirection(dir)
{
    set(directionRef, dir);
    document.getElementById("status").innerText = dir.toUpperCase();
}

function resetJoystick()
{
    joystick.style.left = "80px";
    joystick.style.top = "80px";

    sendDirection("stop");
}

base.addEventListener("touchstart", () =>
{
    dragging = true;
});

base.addEventListener("touchmove", (e)=>
{
    if(!dragging) return;

    const rect = base.getBoundingClientRect();

    let x = e.touches[0].clientX - rect.left;
    let y = e.touches[0].clientY - rect.top;

    let dx = x - centerX;
    let dy = y - centerY;

    const distance = Math.sqrt(dx*dx + dy*dy);
    const maxDistance = 80;

    if(distance > maxDistance)
    {
        dx = dx / distance * maxDistance;
        dy = dy / distance * maxDistance;
    }

    joystick.style.left = (centerX + dx - 50) + "px";
    joystick.style.top = (centerY + dy - 50) + "px";

    if(Math.abs(dx) > Math.abs(dy))
    {
        if(dx > 20)
            sendDirection("right");
        else if(dx < -20)
            sendDirection("left");
    }
    else
    {
        if(dy > 20)
            sendDirection("down");
        else if(dy < -20)
            sendDirection("up");
    }
});

base.addEventListener("touchend", () =>
{
    dragging = false;
    resetJoystick();
});

</script>

</body>
</html>
